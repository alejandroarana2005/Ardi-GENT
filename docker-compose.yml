version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: haia_db
      POSTGRES_USER: haia_user
      POSTGRES_PASSWORD: haia_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U haia_user -d haia_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://haia_user:haia_pass@db:5432/haia_db
      API_HOST: 0.0.0.0
      API_PORT: 8000
      DEBUG: "false"
      LOG_LEVEL: INFO
    volumes:
      - ./app:/app/app

volumes:
  postgres_data:
